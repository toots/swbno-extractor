<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SWBNO Data Explorer</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f0f2f5;
        color: #1a1a2e;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        background: #1a1a2e;
        color: white;
        padding: 1.25rem 2rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        flex-shrink: 0;
        z-index: 10;
      }

      header h1 {
        font-size: 1.25rem;
        font-weight: 600;
      }

      header span {
        font-size: 0.85rem;
        opacity: 0.6;
      }

      .app-shell {
        flex: 1;
        display: flex;
        overflow: hidden;
        min-height: 0;
      }

      #sidebar {
        width: 260px;
        flex-shrink: 0;
        background: #fff;
        border-right: 1px solid #e0e0e8;
        overflow-y: auto;
        padding: 0.75rem 0;
      }

      #sidebar-list {
        list-style: none;
      }

      .group-label {
        padding: 0.55rem 1rem 0.25rem;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #999;
        cursor: default;
        margin-top: 0.5rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .group-label:first-child {
        margin-top: 0;
      }

      .nav-item {
        padding: 0.6rem 1rem;
        font-size: 0.85rem;
        cursor: pointer;
        color: #333;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        border-left: 3px solid transparent;
        transition: background 0.1s;
      }

      .nav-item:hover {
        background: #f0f4ff;
      }

      .nav-item.active {
        background: #e8f0fe;
        border-left-color: #0077b6;
        color: #0077b6;
        font-weight: 600;
      }

      #main-content {
        flex: 1;
        overflow-y: auto;
        padding: 2rem;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .page-title {
        font-size: 1.3rem;
        font-weight: 700;
        color: #1a1a2e;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
      }

      button {
        padding: 0.65rem 1.5rem;
        border: none;
        border-radius: 6px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s, opacity 0.15s;
      }

      #btn-generate {
        background: #0077b6;
        color: white;
      }

      #btn-generate:hover:not(:disabled) {
        background: #005f99;
      }

      #btn-generate:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      #btn-download {
        background: #2d9e5f;
        color: white;
      }

      #btn-download:hover {
        background: #237a4a;
      }

      #status {
        font-size: 0.9rem;
        color: #555;
      }

      #status.error {
        color: #c0392b;
      }

      .row-count {
        font-size: 0.8rem;
        color: #888;
        font-weight: normal;
      }

      .panel {
        background: white;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.07);
        overflow: hidden;
      }

      .panel-header {
        padding: 0.9rem 1.25rem;
        background: #f8f9fa;
        border-bottom: 1px solid #e9ecef;
        font-weight: 600;
        font-size: 0.9rem;
        color: #495057;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      #table-container {
        overflow-x: auto;
        max-height: 450px;
        overflow-y: auto;
      }

      #preview-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
      }

      #preview-table thead {
        position: sticky;
        top: 0;
        z-index: 1;
        background: #1a1a2e;
        color: white;
      }

      #preview-table th {
        padding: 0.65rem 1rem;
        text-align: left;
        font-weight: 600;
        white-space: nowrap;
        cursor: pointer;
        user-select: none;
      }

      #preview-table th:hover {
        background: #2d2d4e;
      }

      #preview-table th.sorted {
        background: #0077b6;
      }

      #preview-table td {
        padding: 0.55rem 1rem;
        border-bottom: 1px solid #f0f0f0;
        white-space: nowrap;
      }

      #preview-table tbody tr:hover {
        background: #f0f7ff;
      }

      #preview-table tbody tr:last-child td {
        border-bottom: none;
      }

      .empty-state {
        padding: 3rem;
        text-align: center;
        color: #aaa;
        font-size: 0.9rem;
      }

      #iframe-container iframe {
        width: 100%;
        height: 500px;
        border: none;
        display: block;
      }

      .loading-skeleton {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 4rem 2rem;
        gap: 1rem;
        color: #888;
        font-size: 0.95rem;
      }

      .spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255,255,255,0.4);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin-right: 6px;
        vertical-align: middle;
      }

      .spinner-large {
        width: 36px;
        height: 36px;
        border: 3px solid #e0e0e8;
        border-top-color: #0077b6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>SWBNO Data Explorer</h1>
      <span>Sewerage &amp; Water Board of New Orleans</span>
    </header>

    <div class="app-shell">
      <nav id="sidebar">
        <ul id="sidebar-list"></ul>
      </nav>
      <main id="main-content"></main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
